<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Motor Control</title>
    <script src="/js/chart.umd.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f9; 
            color: #333;
            margin: 0; 
            padding: 20px; 
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        h2 { margin: 0; font-size: 1.2rem; color: #444; }
        .status { font-weight: bold; font-size: 0.9rem; }
        .connected    { color: #28a745; }
        .disconnected { color: #dc3545; }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
        }
        .metric-label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .metric-value { font-size: 1.8rem; font-weight: bold; margin: 5px 0; line-height: 1.2; }
        .unit { font-size: 0.9rem; color: #888; font-weight: normal; }
        
        .text-cyan  { color: #17a2b8; }
        .text-amber { color: #fd7e14; }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            font-weight: 600;
        }
        .btn-led { background: #e2e6ea; color: #444; margin-bottom: 15px; }
        .btn-led.active { background: #28a745; color: white; box-shadow: 0 4px 10px rgba(40,167,69,0.3); }
        
        .slider-group { margin-top: 15px; }
        input[type=range] {
            width: 100%; margin: 10px 0;
            accent-color: #007bff; height: 6px;
            background: #ddd; border-radius: 5px;
            outline: none; -webkit-appearance: none; appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #007bff; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .dir-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn-dir { background: #f8f9fa; border: 1px solid #ddd; color: #555; }
        .btn-dir.active { background: #007bff; color: white; border-color: #007bff; }

        .chart-wrapper {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            position: relative;
            height: 250px;
        }

        .history-panel {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .table-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .table-header h3 { margin: 0; font-size: 1rem; color: #444; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; width: auto; background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; }
        
        .table-wrap { overflow-x: auto; max-height: 300px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #f8f9fa; color: #666; font-weight: 600; position: sticky; top: 0; }
        tr:last-child td { border-bottom: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>ESP32 Monitor</h2>
        <div id="status" class="status disconnected">● Desconectado</div>
    </header>

    <!-- Métricas Principales -->
    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">RPM</div>
            <div class="metric-value text-cyan"><span id="mRpm">0</span></div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Velocidad</div>
            <!-- FIX: unidad corregida a m/s (campo speed_m_s del servidor) -->
            <div class="metric-value text-cyan"><span id="mSpd">0.000</span> <span class="unit">m/s</span></div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Corriente</div>
            <div class="metric-value text-amber"><span id="mCur">0.00</span> <span class="unit">A</span></div>
        </div>
        <div class="metric-card">
            <div class="metric-label">PWM</div>
            <!-- FIX: rango máximo corregido a 1023 (10-bit) -->
            <div class="metric-value"><span id="mPwm">0</span> <span class="unit">/1023</span></div>
        </div>
    </div>

    <!-- Controles -->
    <div class="control-panel">
        <button id="btnLed" class="btn-led" onclick="toggleLed()">LED: OFF</button>
        
        <div class="slider-group">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:#666; margin-bottom:5px;">
                <label>Velocidad (PWM 0-1023)</label>
                <span id="valVel">0</span>
            </div>
            <!-- FIX: max corregido a 1023 (10-bit PWM) -->
            <input type="range" min="0" max="1023" value="0" id="sliderVel">
        </div>

        <div class="dir-buttons">
            <button class="btn-dir active" id="btnFwd" onclick="setDir(1)">Adelante (FWD)</button>
            <button class="btn-dir"        id="btnRev" onclick="setDir(-1)">Atrás (REV)</button>
        </div>
    </div>

    <!-- Gráficas -->
    <div class="chart-wrapper">
        <canvas id="chartRpm"></canvas>
    </div>
    <div class="chart-wrapper">
        <canvas id="chartCur"></canvas>
    </div>

    <!-- Historial -->
    <div class="history-panel">
        <div class="table-header">
            <h3>Historial Reciente</h3>
            <div>
                <button class="btn-sm" onclick="exportCSV()">CSV</button>
                <button class="btn-sm btn-danger" onclick="clearData()">Limpiar</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Hora</th>
                        <th>RPM</th>
                        <th>m/s</th>
                        <th>Amp</th>
                        <th>PWM</th>
                        <th>Dir</th>
                    </tr>
                </thead>
                <tbody id="histBody">
                    <tr><td colspan="6" style="text-align:center; color:#999;">Esperando datos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const MAX_POINTS = 100;
    let ws;
    let isDragging = false;
    let logData = [];

    // ---- Gráficas ----
    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
            x: { display: false },
            y: { beginAtZero: true, grid: { color: '#f0f0f0' } }
        }
    };

    const chartRpm = new Chart(
        document.getElementById('chartRpm').getContext('2d'), {
        type: 'line',
        data: {
            labels: Array(MAX_POINTS).fill(''),
            datasets: [{
                label: 'RPM',
                data: Array(MAX_POINTS).fill(0),
                borderColor: '#17a2b8',
                backgroundColor: 'rgba(23,162,184,0.1)',
                borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0
            }]
        },
        options: commonOptions
    });

    const chartCur = new Chart(
        document.getElementById('chartCur').getContext('2d'), {
        type: 'line',
        data: {
            labels: Array(MAX_POINTS).fill(''),
            datasets: [{
                label: 'Corriente (A)',
                data: Array(MAX_POINTS).fill(0),
                borderColor: '#fd7e14',
                backgroundColor: 'rgba(253,126,20,0.1)',
                borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0
            }]
        },
        options: commonOptions
    });

    // ---- WebSocket ----
    function init() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${window.location.hostname}/ws`);

        ws.onopen = () => {
            document.getElementById('status').innerText = '● Conectado';
            document.getElementById('status').className = 'status connected';
        };

        ws.onmessage = (event) => {
            try {
                const d = JSON.parse(event.data);
                updateUI(d);
                updateCharts(d);
            } catch(e) { console.error('Error JSON', e); }
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = '● Desconectado';
            document.getElementById('status').className = 'status disconnected';
            setTimeout(init, 2000);
        };
    }

    // ---- UI ----
    function updateUI(d) {
        if (d.rpm !== undefined)
            document.getElementById('mRpm').innerText = parseFloat(d.rpm).toFixed(0);

        // FIX: leer speed_m_s (campo corregido en el servidor)
        if (d.speed_m_s !== undefined)
            document.getElementById('mSpd').innerText = parseFloat(d.speed_m_s).toFixed(3);

        if (d.current !== undefined)
            document.getElementById('mCur').innerText = parseFloat(d.current).toFixed(2);

        if (d.velocity !== undefined) {
            document.getElementById('mPwm').innerText = d.velocity;
            const slider = document.getElementById('sliderVel');
            if (!isDragging && slider.value != d.velocity) {
                slider.value = d.velocity;
                document.getElementById('valVel').innerText = d.velocity;
            }
        }

        if (d.ledState !== undefined) {
            const btn = document.getElementById('btnLed');
            if (d.ledState) {
                btn.innerText = 'LED: ON';
                btn.classList.add('active');
            } else {
                btn.innerText = 'LED: OFF';
                btn.classList.remove('active');
            }
        }

        if (d.direction !== undefined) {
            document.getElementById('btnFwd').classList.toggle('active', d.direction >= 0);
            document.getElementById('btnRev').classList.toggle('active', d.direction < 0);
        }
    }

    // ---- Gráficas + historial ----
    let lastLogTime = 0;

    function updateCharts(d) {
        if (d.rpm !== undefined) {
            chartRpm.data.datasets[0].data.push(d.rpm);
            chartRpm.data.datasets[0].data.shift();
            chartRpm.update('none');
        }
        if (d.current !== undefined) {
            chartCur.data.datasets[0].data.push(d.current);
            chartCur.data.datasets[0].data.shift();
            chartCur.update('none');
        }

        const now = Date.now();
        if (now - lastLogTime > 1000 && d.rpm !== undefined) {
            lastLogTime = now;
            const row = {
                time: new Date().toLocaleTimeString(),
                rpm:  d.rpm,
                // FIX: guardar en m/s usando el campo correcto
                spd:  d.speed_m_s !== undefined ? d.speed_m_s : (d.speed_mm_s !== undefined ? d.speed_mm_s / 1000 : 0),
                cur:  d.current  || 0,
                pwm:  d.velocity || 0,
                dir:  document.getElementById('btnFwd').classList.contains('active') ? 'FWD' : 'REV'
            };
            logData.unshift(row);
            if (logData.length > 50) logData.pop();
            renderTable();
        }
    }

    function renderTable() {
        const tbody = document.getElementById('histBody');
        if (logData.length === 0) return;
        let html = '';
        logData.forEach(r => {
            html += `<tr>
                <td>${r.time}</td>
                <td>${parseFloat(r.rpm).toFixed(0)}</td>
                <td>${parseFloat(r.spd).toFixed(3)}</td>
                <td>${parseFloat(r.cur).toFixed(2)}</td>
                <td>${r.pwm}</td>
                <td>${r.dir}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    // ---- Controles ----
    function send(data) {
        if (ws && ws.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify(data));
    }

    function toggleLed() {
        const btn  = document.getElementById('btnLed');
        const isOn = btn.classList.contains('active');
        btn.classList.toggle('active');
        btn.innerText = isOn ? 'LED: OFF' : 'LED: ON';
        send({ led: !isOn });
    }

    function setDir(dir) { send({ direction: dir }); }

    // ---- Slider ----
    const slider = document.getElementById('sliderVel');
    let sliderTimeout;

    slider.addEventListener('input', (e) => {
        isDragging = true;
        document.getElementById('valVel').innerText = e.target.value;
        clearTimeout(sliderTimeout);
        sliderTimeout = setTimeout(() => {
            send({ velocity: parseInt(e.target.value) });
        }, 100);
    });

    slider.addEventListener('change', (e) => {
        isDragging = false;
        send({ velocity: parseInt(e.target.value) });
    });

    // ---- Utilidades ----
    function clearData() {
        logData = [];
        renderTable();
        chartRpm.data.datasets[0].data.fill(0);
        chartCur.data.datasets[0].data.fill(0);
        chartRpm.update();
        chartCur.update();
    }

    function exportCSV() {
        if (logData.length === 0) return alert('No hay datos');
        let csv = 'Hora,RPM,Velocidad(m/s),Corriente(A),PWM,Direccion\n';
        logData.forEach(r => {
            csv += `${r.time},${r.rpm},${r.spd},${r.cur},${r.pwm},${r.dir}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url  = window.URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'motor_log.csv';
        a.click();
        window.URL.revokeObjectURL(url);  // FIX: liberar la URL del objeto
    }

    window.onload = init;
</script>
</body>
</html>
