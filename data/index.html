<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 - Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f0f2f5;color:#333;padding:16px}
.container{max-width:900px;margin:0 auto;height:100%;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;flex-shrink:0;flex-wrap:wrap;gap:10px}
h2{margin:0;font-size:1.1rem;color:#444}
.status{font-weight:700;font-size:.85rem}
.connected{color:#28a745}
.disconnected{color:#dc3545}
.link-monitor{background:#007bff;color:#fff;padding:7px 16px;border-radius:6px;text-decoration:none;font-size:.85rem;font-weight:600}
.link-monitor:hover{background:#0056b3}
.speed-banner{background:#fff;padding:14px 18px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:10px}
.speed-label{font-size:.78rem;color:#888;text-transform:uppercase;letter-spacing:1px}
.speed-value{font-size:2rem;font-weight:700;color:#17a2b8;display:flex;align-items:baseline;gap:6px}
.speed-unit{font-size:.9rem;color:#999;font-weight:400}
.speed-extra{font-size:.88rem;color:#666;line-height:1.6}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:14px;flex-shrink:0}
.metric-card{background:#fff;padding:14px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
.metric-label{font-size:.72rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.metric-value{font-size:1.7rem;font-weight:700;line-height:1.2}
.unit{font-size:.85rem;color:#999;font-weight:400}
.text-cyan{color:#17a2b8}
.text-amber{color:#fd7e14}
.control-panel{background:#fff;padding:18px;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);flex-shrink:0}
button{padding:12px 20px;font-size:.95rem;border:none;border-radius:6px;cursor:pointer;transition:background .2s,color .2s,box-shadow .2s;width:100%;font-weight:600}
.btn-led{background:#e2e6ea;color:#444;margin-bottom:14px}
.btn-led.active{background:#28a745;color:#fff;box-shadow:0 3px 8px rgba(40,167,69,.3)}
.slider-group{margin-top:14px}
.slider-label{display:flex;justify-content:space-between;font-size:.88rem;color:#666;margin-bottom:4px}
input[type=range]{width:100%;margin:8px 0;accent-color:#007bff;height:6px;border-radius:5px;outline:none;cursor:pointer}
.dir-buttons{display:flex;gap:10px;margin-top:14px}
.btn-dir{background:#f8f9fa;border:1px solid #ddd;color:#555;flex:1}
.btn-dir.active{background:#007bff;color:#fff;border-color:#007bff}
</style>
<base target="_blank">
</head>
<body>
<div class="container">
  <header>
    <h2>ESP32 - Control</h2>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div id="status" class="status disconnected">Desconectado</div>
      <a href="/monitor.html" class="link-monitor">Monitoreo</a>
    </div>
  </header>

  <div class="speed-banner">
    <div>
      <div class="speed-label">Velocidad Actual</div>
      <div class="speed-value">
        <span id="bannerSpeed">0.0</span>
        <span class="speed-unit">mm/s</span>
      </div>
    </div>
    <div class="speed-extra">
      <div><strong id="bannerRpm">0</strong> RPM</div>
      <div><strong id="bannerPwm">0</strong> / 1023 PWM</div>
    </div>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <div class="metric-label">RPM</div>
      <div class="metric-value text-cyan"><span id="mRpm">0</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Velocidad</div>
      <div class="metric-value text-cyan"><span id="mSpd">0</span> <span class="unit">mm/s</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Corriente</div>
      <div class="metric-value text-amber"><span id="mCur">0.00</span> <span class="unit">A</span></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">PWM</div>
      <div class="metric-value"><span id="mPwm">0</span> <span class="unit">/1023</span></div>
    </div>
  </div>

  <div class="control-panel">
    <button id="btnLed" class="btn-led" onclick="toggleLed()">LED: OFF</button>
    <div class="slider-group">
      <div class="slider-label">
        <label>Velocidad (PWM)</label>
        <span id="valVel">0</span>
      </div>
      <input type="range" min="0" max="1023" value="0" id="sliderVel">
    </div>
    <div class="dir-buttons">
      <button class="btn-dir active" id="btnFwd" onclick="setDir(1)">Adelante</button>
      <button class="btn-dir" id="btnRev" onclick="setDir(-1)">Atras</button>
    </div>
  </div>
</div>

<script>
let ws = null;
let wsRetryTimer = null;
let isDragging = false;
let ledState = false;
let direction = 1;

function wsConnect() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  
  // Limpiar timer si existe
  if (wsRetryTimer) { clearTimeout(wsRetryTimer); wsRetryTimer = null; }

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.hostname}/ws`);
  
  ws.onopen = () => {
    document.getElementById('status').textContent = 'Conectado';
    document.getElementById('status').className = 'status connected';
  };
  
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      updateBanner(d);
      updateUI(d);
    } catch (err) { console.error('JSON parse error', err); }
  };
  
  ws.onerror = () => { ws.close(); };
  
  ws.onclose = () => {
    document.getElementById('status').textContent = 'Desconectado';
    document.getElementById('status').className = 'status disconnected';
    ws = null;
    
    // Solo reconectar si la página es visible
    if (document.visibilityState === 'visible') {
        if (!wsRetryTimer) wsRetryTimer = setTimeout(wsConnect, 3000);
    }
  };
}

function wsSend(data) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
}

function updateBanner(d) {
  if (d.speed_mm_s !== undefined) document.getElementById('bannerSpeed').textContent = (+d.speed_mm_s).toFixed(1);
  if (d.rpm !== undefined)        document.getElementById('bannerRpm').textContent  = (+d.rpm).toFixed(0);
  if (d.velocity !== undefined)   document.getElementById('bannerPwm').textContent  = d.velocity;
}

function updateUI(d) {
  if (d.rpm !== undefined)       document.getElementById('mRpm').textContent = (+d.rpm).toFixed(0);
  if (d.speed_mm_s !== undefined)document.getElementById('mSpd').textContent = (+d.speed_mm_s).toFixed(1);
  if (d.current !== undefined)   document.getElementById('mCur').textContent = (+d.current).toFixed(2);
  if (d.velocity !== undefined) {
    document.getElementById('mPwm').textContent = d.velocity;
    if (!isDragging) {
      document.getElementById('sliderVel').value = d.velocity;
      document.getElementById('valVel').textContent = d.velocity;
    }
  }
  if (d.ledState !== undefined) {
    ledState = !!d.ledState;
    const btn = document.getElementById('btnLed');
    btn.textContent = ledState ? 'LED: ON' : 'LED: OFF';
    btn.classList.toggle('active', ledState);
  }
  if (d.direction !== undefined) {
    direction = d.direction;
    document.getElementById('btnFwd').classList.toggle('active', d.direction >= 0);
    document.getElementById('btnRev').classList.toggle('active', d.direction < 0);
  }
}

function toggleLed() {
  ledState = !ledState;
  const btn = document.getElementById('btnLed');
  btn.textContent = ledState ? 'LED: ON' : 'LED: OFF';
  btn.classList.toggle('active', ledState);
  wsSend({ led: ledState });
}

function setDir(dir) {
  direction = dir;
  document.getElementById('btnFwd').classList.toggle('active', dir >= 0);
  document.getElementById('btnRev').classList.toggle('active', dir < 0);
  wsSend({ direction: dir });
}

const slider = document.getElementById('sliderVel');
let sliderTimeout = null;
slider.addEventListener('input', e => {
  isDragging = true;
  document.getElementById('valVel').textContent = e.target.value;
  clearTimeout(sliderTimeout);
  sliderTimeout = setTimeout(() => wsSend({ velocity: +e.target.value }), 80);
});
slider.addEventListener('pointerup', e => {
  isDragging = false;
  clearTimeout(sliderTimeout);
  wsSend({ velocity: +e.target.value });
});

// --- GESTIÓN DE CICLO DE VIDA ---

// Cierre limpio antes de navegar o recargar
window.addEventListener('beforeunload', () => {
    if (ws) {
        ws.close(1000, 'navegando');
    }
});

// Conectar solo cuando la página es visible
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
        wsConnect();
    } else {
        if (ws) {
            ws.close(1000, 'oculto');
            ws = null;
        }
        if (wsRetryTimer) {
            clearTimeout(wsRetryTimer);
            wsRetryTimer = null;
        }
    }
});

// Arranque inicial
window.addEventListener('load', () => {
    if (document.visibilityState === 'visible') {
        wsConnect();
    }
});
</script>
</body>
</html>
