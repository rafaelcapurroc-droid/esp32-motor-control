<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 - Control de Motor</title>
    <style>
        :root {
            --bg-color: #0d0f14;
            --card-bg: #1e2330;
            --text-color: #c8d0e0;
            --accent-color: #00e5ff;
            --warn-color: #ff6b35;
            --success-color: #39ff6e;
            --danger-color: #ff3355;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--accent-color); margin-bottom: 10px; }
        .status-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9em;
            color: #888;
        }
        #ws-status { font-weight: bold; }
        .connected { color: var(--success-color) !important; }
        .disconnected { color: var(--danger-color) !important; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        .card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h3 { margin: 0 0 10px 0; font-size: 0.9em; color: #888; }
        .card .value { font-size: 1.8em; font-weight: bold; color: var(--accent-color); }
        .card .unit { font-size: 0.8em; color: #666; }

        .controls {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
        }
        .slider-container { margin: 20px 0; }
        input[type=range] {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: #333;
            outline: none;
        }
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-fwd { background-color: var(--accent-color); color: #000; }
        .btn-rev { background-color: var(--warn-color); color: #000; }
        .btn-stop { background-color: var(--danger-color); color: #fff; }
        
        .monitor-link {
            margin-top: 20px;
            color: var(--accent-color);
            text-decoration: none;
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>ESP32 - Control</h1>
    
    <div class="status-bar">
        <span id="ws-status" class="disconnected">Desconectado</span>
        <a href="/monitor.html" class="monitor-link">Ir a Monitoreo</a>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Velocidad Cinta</h3>
            <span class="value" id="disp-speed">0.000</span>
            <span class="unit">m/s</span>
        </div>
        <div class="card">
            <h3>RPM Eje</h3>
            <span class="value" id="disp-rpm">0</span>
            <span class="unit">RPM</span>
        </div>
        <div class="card">
            <h3>Corriente</h3>
            <span class="value" id="disp-current">0.00</span>
            <span class="unit">A</span>
        </div>
        <div class="card">
            <h3>PWM</h3>
            <span class="value" id="disp-pwm">0</span>
            <span class="unit">/ 1023</span>
        </div>
    </div>

    <div class="controls">
        <div class="slider-container">
            <label for="speed-slider">Velocidad (PWM): <span id="slider-val">0</span></label>
            <input type="range" id="speed-slider" min="0" max="1023" value="0">
        </div>
        
        <div class="buttons">
            <button class="btn-fwd" onclick="setDirection(1)">Adelante</button>
            <button class="btn-stop" onclick="stopMotor()">Detener</button>
            <button class="btn-rev" onclick="setDirection(-1)">Atrás</button>
        </div>
    </div>

    <script>
        let ws;
        const wsStatus = document.getElementById('ws-status');
        const speedSlider = document.getElementById('speed-slider');
        const sliderVal = document.getElementById('slider-val');

        // Elementos de visualización
        const dispSpeed = document.getElementById('disp-speed');
        const dispRpm = document.getElementById('disp-rpm');
        const dispCurrent = document.getElementById('disp-current');
        const dispPwm = document.getElementById('disp-pwm');

        function connectWS() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                wsStatus.textContent = "Conectado";
                wsStatus.className = "connected";
            };

            ws.onclose = () => {
                wsStatus.textContent = "Desconectado";
                wsStatus.className = "disconnected";
                setTimeout(connectWS, 2000); // Reintentar conexión
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                updateMetrics(data);
            };
        }

        function updateMetrics(data) {
            if (data.speed_m_s !== undefined) {
                dispSpeed.textContent = parseFloat(data.speed_m_s).toFixed(3);
            }
            if (data.rpm !== undefined) {
                dispRpm.textContent = parseFloat(data.rpm).toFixed(0);
            }
            if (data.current !== undefined) {
                dispCurrent.textContent = parseFloat(data.current).toFixed(2);
            }
            if (data.velocity !== undefined) {
                dispPwm.textContent = data.velocity;
                // Solo actualizar slider si no está siendo arrastrado por el usuario
                if (document.activeElement !== speedSlider) {
                    speedSlider.value = data.velocity;
                    sliderVal.textContent = data.velocity;
                }
            }
        }

        function sendCommand(cmd) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(cmd));
            }
        }

        speedSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            sliderVal.textContent = val;
            sendCommand({ velocity: parseInt(val) });
        });

        function setDirection(dir) {
            sendCommand({ direction: dir });
        }

        function stopMotor() {
            sendCommand({ velocity: 0 });
        }

        // Iniciar conexión
        window.onload = connectWS;
    </script>
</body>
</html>
