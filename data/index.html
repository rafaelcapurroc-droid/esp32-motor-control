<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 - Control Motor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background-color: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 90%; max-width: 500px; text-align: center; }
        h1 { color: #00bcd4; margin-bottom: 20px; font-size: 1.5rem; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; color: #aaa; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .connected { background-color: #4caf50; }
        .disconnected { background-color: #f44336; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .data-card { background-color: #2c2c2c; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .data-label { font-size: 0.8rem; color: #888; display: block; margin-bottom: 5px; }
        .data-value { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .unit { font-size: 0.8rem; color: #aaa; }

        .control-section { background-color: #252525; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input[type=range] { width: 100%; margin: 15px 0; accent-color: #00bcd4; cursor: pointer; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.2s; flex: 1; }
        .btn-stop { background-color: #d32f2f; color: white; }
        .btn-stop:hover { background-color: #b71c1c; }
        .btn-small { padding: 5px 10px; font-size: 0.8rem; background-color: #444; color: white; }
        .btn-small:hover { background-color: #555; }
        
        .fine-tune { display: flex; justify-content: space-between; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-bar">
        <span id="connectionStatus"><span class="status-indicator disconnected"></span>Desconectado</span>
        <a href="/monitor.html" style="color: #00bcd4; text-decoration: none;">[Monitoreo]</a>
    </div>

    <h1>ESP32 - Control Motor</h1>

    <div class="data-grid">
        <div class="data-card">
            <span class="data-label">Velocidad deseada</span>
            <span class="data-value" id="targetSpeedDisplay">0.000</span> <span class="unit">m/s</span>
        </div>
        <div class="data-card">
            <span class="data-label">Velocidad actual</span>
            <span class="data-value" id="actualSpeedDisplay">0.000</span> <span class="unit">m/s</span>
        </div>
        <div class="data-card">
            <span class="data-label">Corriente</span>
            <span class="data-value" id="currentDisplay">0.00</span> <span class="unit">A</span>
        </div>
        <div class="data-card">
            <span class="data-label">LED</span>
            <span class="data-value" id="ledStatus">OFF</span>
        </div>
    </div>

    <div class="control-section">
        <div class="fine-tune">
            <button class="btn-small" onclick="adjustSpeed(-0.5)">-0.5 m/s</button>
            <button class="btn-small" onclick="adjustSpeed(+0.5)">+0.5 m/s</button>
        </div>
        <div class="fine-tune">
            <button class="btn-small" onclick="adjustSpeed(-0.1)">-0.1 m/s</button>
            <button class="btn-small" onclick="adjustSpeed(+0.1)">+0.1 m/s</button>
        </div>

        <div class="btn-group">
            <button class="btn-stop" onclick="stopMotor()">STOP</button>
        </div>
    </div>
</div>

<script>
    let ws;
    let isUpdatingFromWS = false; // Bandera para evitar bucles de actualización
    const MAX_SPEED_MS = 1.9; // Ajusta esto según tu configuración en motor_config.h si es diferente

    function connectWS() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUri = `${protocol}//${window.location.hostname}/ws`;
        
        ws = new WebSocket(wsUri);

        ws.onopen = function() {
            document.getElementById('connectionStatus').innerHTML = '<span class="status-indicator connected"></span>Conectado';
            console.log("WebSocket Conectado");
        };

        ws.onclose = function() {
            document.getElementById('connectionStatus').innerHTML = '<span class="status-indicator disconnected"></span>Desconectado';
            console.log("WebSocket Desconectado. Reconectando...");
            setTimeout(connectWS, 2000);
        };

        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                updateUI(data);
            } catch (e) {
                console.error("Error parsing JSON:", e);
            }
        };
    }

    function updateUI(data) {
        // Actualizar valores de lectura (siempre se actualizan)
        if (data.speed_m_s !== undefined) {
            document.getElementById('actualSpeedDisplay').textContent = parseFloat(data.speed_m_s).toFixed(3);
        }
        if (data.current !== undefined) {
            document.getElementById('currentDisplay').textContent = parseFloat(data.current).toFixed(2);
        }
        if (data.ledState !== undefined) {
            document.getElementById('ledStatus').textContent = data.ledState ? "ON" : "OFF";
        }

        // Sincronización del Slider y Target Speed
        // Solo actualizamos el slider si el cambio NO vino del usuario localmente
        if (!isUpdatingFromWS) {
            if (data.target_speed !== undefined) {
                const targetVal = parseFloat(data.target_speed);
                document.getElementById('targetSpeedDisplay').textContent = targetVal.toFixed(3);
                
                // Actualizar slider solo si la diferencia es significativa para evitar saltos visuales mínimos
                const slider = document.getElementById('speedSlider');
                if (Math.abs(parseFloat(slider.value) - targetVal) > 0.01) {
                    slider.value = targetVal;
                }
            }
        }
        
        // Resetear la bandera después de procesar
        isUpdatingFromWS = false;
    }

    function sendSpeed(speedMs) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            // Limitar valores
            if (speedMs < 0) speedMs = 0;
            if (speedMs > MAX_SPEED_MS) speedMs = MAX_SPEED_MS;
            
            // Enviar como speed_m_s para mayor precisión
            ws.send(JSON.stringify({ speed_m_s: parseFloat(speedMs.toFixed(3)) }));
            
            // Actualizar UI localmente de inmediato para mejor feedback
            document.getElementById('targetSpeedDisplay').textContent = speedMs.toFixed(3);
        }
    }

    function adjustSpeed(delta) {
        const currentValue = parseFloat(document.getElementById('targetSpeedDisplay').textContent) || 0;
        let newVal = currentValue + delta;
        sendSpeed(newVal);
    }

    function stopMotor() {
        sendSpeed(0);
    }

    // Iniciar conexión
    connectWS();
</script>

</body>
</html>
