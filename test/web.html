<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ESP32 Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        button { padding: 15px 30px; font-size: 16px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-led-off { background: #dc3545; color: white; }
        .btn-led-on { background: #28a745; color: white; }
        .status { margin-bottom: 15px; font-weight: bold; }
        .connected { color: green; }
        .disconnected { color: red; }
        input[type=range] { width: 100%; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Control ESP32</h2>
        <div id="status" class="status disconnected">Desconectado</div>
        
        <!-- Botón LED -->
        <button id="btnLed" class="btn-led-off" onclick="toggleLed()">LED: OFF</button>
        
        <hr>
        
        <!-- Slider Velocidad -->
        <label>Velocidad:</label>
        <input type="range" min="0" max="1023" value="0" id="sliderVel" oninput="setVel(this.value)">
        <p>Valor: <span id="valVel">0</span></p>
    </div>

    <script>
        let ws;
        let lastSentValue = -1; // Para recordar último valor enviado
        
        function init() {
            const url = 'ws://' + window.location.hostname + '/ws';
            ws = new WebSocket(url);

            ws.onopen = function() {
                document.getElementById('status').innerText = "CONECTADO";
                document.getElementById('status').className = "status connected";
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    // 1. Sincronizar LED
                    if(data.ledState !== undefined) {
                        updateLedButtonUI(data.ledState);
                    }

                    // 2. Sincronizar Velocidad
                    if(data.velocity !== undefined) {
                        const slider = document.getElementById('sliderVel');
                        const valText = document.getElementById('valVel');
                        
                        // TRUCO PARA iOS/ANDROID:
                        // Solo actualizamos el slider visualmente si NO estamos enviando datos activamente
                        // O si la diferencia es grande (sincronización desde otro celular)
                        
                        // Convertimos a string para comparar fácil
                        if (String(slider.value) !== String(data.velocity)) {
                             slider.value = data.velocity;
                             valText.innerText = data.velocity;
                        }
                    }

                } catch(e) { console.error("Error parsing JSON", e); }
            };

            ws.onclose = function() {
                document.getElementById('status').innerText = "Desconectado";
                document.getElementById('status').className = "status disconnected";
                setTimeout(init, 2000);
            };
            
            ws.onerror = function(err) {
                console.error("WS Error", err);
            };
        }

        function toggleLed() {
            const btn = document.getElementById('btnLed');
            const currentState = btn.innerText.includes("ON");
            const newState = !currentState;
            
            updateLedButtonUI(newState);
            
            if(ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ led: newState }));
            }
        }

        function updateLedButtonUI(isOn) {
            const btn = document.getElementById('btnLed');
            if (isOn) {
                btn.innerText = "LED: ON";
                btn.className = "btn-led-on";
            } else {
                btn.innerText = "LED: OFF";
                btn.className = "btn-led-off";
            }
        }

        // FUNCIÓN MEJORADA PARA SLIDER
        function setVel(v) {
            const valInt = parseInt(v);
            document.getElementById('valVel').innerText = valInt;

            // EVITAR ENVÍO MASIVO (Throttling simple)
            // Solo enviamos si el valor ha cambiado significativamente o es el final
            // Pero para sincronización perfecta en móviles, lo mejor es enviar al evento 'change' (al soltar)
            // Sin embargo, para ver el cambio en tiempo real, usaremos una lógica híbrida:
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Enviamos inmediatamente. El servidor hará broadcast.
                // El truco está en que el onmessage NO debe bloquear el input.
                ws.send(JSON.stringify({ velocity: valInt }));
            }
        }

        // Event Listeners Manuales para mejor control en móviles
        window.onload = function() {
            init();
            
            const slider = document.getElementById('sliderVel');
            
            // 'input' se dispara mientras arrastras (tiempo real)
            slider.addEventListener('input', function(e) {
                setVel(e.target.value);
            });

            // 'change' se dispara al soltar (garantía de sincronización final)
            slider.addEventListener('change', function(e) {
                setVel(e.target.value);
            });
            
            // Botón LED
            document.getElementById('btnLed').addEventListener('click', toggleLed);
        };
    </script>
</body>
</html>
